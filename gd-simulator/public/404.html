<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Redirecting...</title>
  <script>
    var path = window.location.pathname;
    var query = window.location.search;
    var hash = window.location.hash;
    var redirectUrl = '/?redirect=' + encodeURIComponent(path + query + hash);
    window.location.replace(
      window.location.origin + '/GD-analyzer' + redirectUrl
    );
  </script>
</head>
<body>
  <p>Redirecionando...</p>
</body>
</html>
